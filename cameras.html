---
layout: default
noindex: true
not_homepage: true
---

<!-- Meta tags to prevent search engine indexing -->
<meta name="robots" content="noindex, nofollow">
<meta name="googlebot" content="noindex, nofollow">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

<!-- Leaflet JavaScript -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<!-- Simple header with home link -->
<div class="map-header">
  <a href="/" class="home-link">
    <i class="fa-solid fa-xmark"></i> Close Map
  </a>
</div>

<!-- Map container - now full screen -->
<div id="map-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 10;"></div>

<!-- Loading overlay that will be hidden when map loads -->
<div id="loading-message" class="loading-message" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; background-color: var(--color-primary);">
    <h3>Loading Cameras...</h3>
</div>
