---
layout: default
---

<div id="loading-message" class="loading-message">
    <h3>loading kansas city...</h3>
</div>
<div class="video-container" id="video-container" style="display: none;">
    <!-- Video items will be dynamically inserted here -->
</div>
<div class="load-more-container" id="load-more-container" style="display: none;">
    <button class="highlight highlight-fullwidth" id="load-more-btn">
        <i class="fa-solid fa-circle-plus"></i>Load More
    </button>
</div>

<!-- Map Modal -->
<div id="map-modal" class="map-modal">
    <h2 id="map-modal-title" class="map-modal-title"></h2>
    <div class="map-modal-content">
        <iframe id="map-iframe" width="100%" height="100%" frameborder="0" style="border:0;" allowfullscreen="" aria-hidden="false" tabindex="0"></iframe>
    </div>
    <button id="map-modal-close" class="map-modal-close">
        <i class="fa-solid fa-xmark"></i>
    </button>
</div>

<!-- Weather Modal -->
<div id="weather-modal" class="map-modal">
    <h2 id="weather-modal-title" class="map-modal-title">Kansas City Weather</h2>
    <div class="map-modal-content">
        <iframe id="weather-iframe" width="100%" height="100%" frameborder="0" style="border:0;" allowfullscreen="" aria-hidden="false" tabindex="0"></iframe>
    </div>
    <button id="weather-modal-close" class="map-modal-close">
        <i class="fa-solid fa-xmark"></i>
    </button>
</div>
